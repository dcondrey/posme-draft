name: "Publish New Draft Version"

on:
  push:
    tags:
      - "draft-*"

jobs:
  build:
    name: "Publish New Draft Version"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup"
        id: setup
        run: date -u +date=%FT%T >> "$GITHUB_OUTPUT"

      - name: "Caching"
        uses: actions/cache@v4
        with:
          path: |
            .gems
            .refcache
            node_modules
            .venv
          key: i-d-${{ steps.setup.outputs.date }}
          restore-keys: i-d-

      - name: "Build Drafts"
        uses: martinthomson/i-d-template@v1
        with:
          make: publish
          token: ${{ github.token }}
